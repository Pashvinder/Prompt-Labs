<body>

<div class="main">

<!-- NAVBAR -->

<center>

<h1 id="login_head">
Welcome <span style="color:#19BDD3;">Back</span>
</h1>

<p id="login_sub">
Sign in to access your PromptLabs dashboard.
</p>

</center>


<div class="login-container">

<div class="login-card">

<form id="loginForm">

<div class="form-group">
<label class="label">Username</label>
<input type="text" id="username" placeholder="Enter your username">
<span class="error" id="userError"></span>
</div>


<div class="form-group">
<label class="label">Password</label>
<input type="password" id="password" placeholder="Enter your password">
<span class="error" id="passError"></span>
</div>


<button type="submit" id="login_btn">
Sign In
</button>


<p class="signup_text">
Don't have an account? <a href="error.html" style="color:#19BDD3;">Sign Up</a>
</p>

</form>

</div>


<div class="login-image">
<img src="assets/img.png" alt="Login Illustration">
</div>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
