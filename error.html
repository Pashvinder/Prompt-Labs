<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Work In Progress | PromptLabs</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family:  sans-serif;
    }

    body {
      background-color: #0b0f1a;
      color: white;
    }

   

    /* Main Section */
    .main {
      height: 85vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      color: white;
      margin-bottom: 1rem;
    }

    p {
      color: #cfd8dc;
      margin-bottom: 2rem;
      max-width: 500px;
    }

    .image-box {
      width: 60%;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .image-box img {
      width: 100%;
      border-radius: 1rem;
      box-shadow: 0 0 20px rgba(27, 212, 230, 0.3);
    }

    .btn {
      padding: 0.8rem 1.5rem;
      border: 2px solid #1bd4e6;
      color: #1bd4e6;
      text-decoration: none;
      border-radius: 0.5rem;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #1bd4e6;
      color: #0b0f1a;
      box-shadow: 0 0 15px #1bd4e6;
    }

  </style>
</head>

<body>

  <!-- Main Content -->
  <div class="main">

    <h1>🚧 Work In Progress</h1>

    <p>
      This page is currently under development. We're building something amazing for you.
    </p>

    <div class="image-box">
      <!-- Replace with your image -->
      <img src="assets/work.png" alt="Work in Progress">
    </div>

    <a href="index.html" class="btn">Go Back Home</a>

  </div>

</body>
</html>
